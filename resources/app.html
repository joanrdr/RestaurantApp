<!DOCTYPE html>
<html lang="es">

<title>RestaurantApp</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0f1117;--surface:#1a1d27;--s2:#232736;--pri:#ff6b35;--pri2:#ff8555;--pril:rgba(255,107,53,0.12);--green:#22c55e;--red:#ef4444;--yellow:#eab308;--blue:#3b82f6;--purple:#a855f7;--text:#f1f5f9;--t2:#94a3b8;--border:#2d3148;--rad:14px;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:15px;}
.app{display:flex;height:100vh;}
.sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.sidebar-logo{padding:18px 20px;font-size:20px;font-weight:800;color:var(--pri);border-bottom:1px solid var(--border);cursor:default;user-select:none;}
.sidebar-logo span{color:var(--text);}
.nav-item{padding:13px 20px;cursor:pointer;display:flex;align-items:center;gap:12px;font-size:15px;font-weight:500;color:var(--t2);transition:all .15s;border-left:4px solid transparent;user-select:none;}
.nav-item:hover{background:var(--s2);color:var(--text);}
.nav-item.active{background:var(--pril);color:var(--pri);border-left-color:var(--pri);font-weight:600;}
.nav-icon{font-size:18px;width:24px;text-align:center;}
.nav-sep{height:1px;background:var(--border);margin:6px 16px;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;min-width:20px;text-align:center;}
.sidebar-footer{margin-top:auto;padding:14px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--t2);user-select:none;cursor:pointer;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.header{padding:16px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.header h1{font-size:22px;font-weight:700;}
.notif-bar{display:flex;gap:8px;flex-wrap:wrap;padding:0 24px;background:var(--surface);}
.notif-pill{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;cursor:pointer;}
.notif-pill.warn{background:rgba(234,179,8,0.12);color:var(--yellow);}
.notif-pill.danger{background:rgba(239,68,68,0.12);color:var(--red);}
.content{flex:1;padding:20px 24px;overflow-y:auto;}
.btn{padding:12px 22px;border:none;border-radius:10px;cursor:pointer;font-size:15px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:8px;user-select:none;}
.btn:active{transform:scale(.97);}
.btn-pri{background:var(--pri);color:#fff;}.btn-pri:hover{background:var(--pri2);}
.btn-green{background:var(--green);color:#fff;}.btn-green:hover{opacity:.9;}
.btn-red{background:var(--red);color:#fff;}.btn-red:hover{opacity:.9;}
.btn-sec{background:var(--s2);color:var(--text);border:1px solid var(--border);}.btn-sec:hover{background:var(--border);}
.btn-purple{background:var(--purple);color:#fff;}.btn-purple:hover{opacity:.9;}
.btn-sm{padding:8px 16px;font-size:13px;}
.btn-lg{padding:14px 28px;font-size:16px;}
.btn-block{width:100%;justify-content:center;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);padding:22px;}
.stat-card .label{font-size:13px;color:var(--t2);margin-bottom:8px;font-weight:500;}
.stat-card .value{font-size:32px;font-weight:800;}
.stat-card .sub{font-size:12px;color:var(--t2);margin-top:4px;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px;}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rad);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
th{padding:12px 16px;text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);background:var(--s2);}
td{padding:12px 16px;font-size:14px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.badge{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;display:inline-block;}
.b-green{background:rgba(34,197,94,.15);color:var(--green);}
.b-red{background:rgba(239,68,68,.15);color:var(--red);}
.b-yellow{background:rgba(234,179,8,.15);color:var(--yellow);}
.b-blue{background:rgba(59,130,246,.15);color:var(--blue);}
.b-purple{background:rgba(168,85,247,.15);color:var(--purple);}
.mesas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;}
.mesa-card{background:var(--surface);border:3px solid var(--border);border-radius:16px;padding:24px 18px;text-align:center;cursor:pointer;transition:all .2s;user-select:none;}
.mesa-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.3);}
.mesa-card.libre{border-color:var(--green);}.mesa-card.ocupada{border-color:var(--red);}.mesa-card.cuenta{border-color:var(--yellow);}
.mesa-num{font-size:38px;font-weight:800;margin-bottom:4px;}
.mesa-card.libre .mesa-num{color:var(--green);}.mesa-card.ocupada .mesa-num{color:var(--red);}.mesa-card.cuenta .mesa-num{color:var(--yellow);}
.mesa-status{font-size:13px;color:var(--t2);text-transform:uppercase;letter-spacing:1px;font-weight:600;}
.mesa-total{font-size:18px;font-weight:700;margin-top:8px;color:var(--pri);}
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:1000;justify-content:center;align-items:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:94%;max-width:800px;max-height:88vh;overflow-y:auto;}
.modal h2{margin-bottom:18px;font-size:20px;font-weight:700;}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:14px;border-top:1px solid var(--border);}
.fg{margin-bottom:14px;}
.fg label{display:block;margin-bottom:6px;font-size:14px;font-weight:600;color:var(--t2);}
.fg input,.fg select,.fg textarea{width:100%;padding:12px 14px;background:var(--bg);border:2px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;outline:none;transition:border-color .15s;}
.fg input:focus,.fg select:focus{border-color:var(--pri);}
.fg input::placeholder{color:#555;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;}
.menu-item{background:var(--s2);border:2px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .15s;text-align:center;user-select:none;}
.menu-item:hover{border-color:var(--pri);background:var(--pril);}
.menu-item-name{font-weight:700;font-size:14px;margin-bottom:3px;}
.menu-item-cat{font-size:11px;color:var(--t2);}
.menu-item-price{font-size:20px;font-weight:800;color:var(--pri);margin-top:6px;}
.cat-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.cat-tab{padding:8px 18px;border-radius:25px;background:var(--s2);color:var(--t2);cursor:pointer;font-size:14px;font-weight:600;border:2px solid var(--border);transition:all .15s;user-select:none;}
.cat-tab:hover{color:var(--text);border-color:var(--t2);}
.cat-tab.active{background:var(--pri);color:#fff;border-color:var(--pri);}
.ped-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);}
.ped-item:last-child{border-bottom:none;}
.ped-name{font-weight:600;font-size:15px;}
.ped-actions{display:flex;align-items:center;gap:8px;}
.qty-btn{width:34px;height:34px;border:2px solid var(--border);background:var(--s2);color:var(--text);border-radius:8px;cursor:pointer;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.qty-btn:hover{border-color:var(--pri);color:var(--pri);}
.ped-qty{font-size:17px;font-weight:700;min-width:26px;text-align:center;}
.ped-price{color:var(--pri);font-weight:700;font-size:16px;min-width:75px;text-align:right;}
.cocina-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.cocina-card{background:var(--surface);border:3px solid var(--yellow);border-radius:16px;padding:18px;}
.cocina-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.cocina-mesa{font-size:22px;font-weight:800;color:var(--pri);}
.cocina-time{font-size:13px;color:var(--yellow);font-weight:600;}
.cocina-item{padding:6px 0;font-size:15px;display:flex;gap:8px;}
.cocina-qty{color:var(--pri);font-weight:800;}
.receipt{background:#fff;color:#000;padding:24px;max-width:380px;margin:0 auto;font-family:'Courier New',monospace;font-size:13px;border-radius:8px;}
.receipt-head{text-align:center;margin-bottom:14px;border-bottom:2px dashed #000;padding-bottom:14px;}
.receipt-head h3{font-size:18px;margin:0 0 4px;}
.receipt-head p{margin:2px 0;}
.receipt-line{display:flex;justify-content:space-between;padding:3px 0;}
.receipt-total{border-top:2px dashed #000;margin-top:10px;padding-top:10px;font-weight:bold;font-size:16px;}
.receipt-foot{text-align:center;margin-top:14px;border-top:2px dashed #000;padding-top:14px;}
.toast{position:fixed;top:20px;right:20px;padding:14px 22px;border-radius:12px;font-size:14px;font-weight:600;z-index:2000;animation:slideIn .3s ease;max-width:400px;}
.toast-ok{background:var(--green);color:#fff;}
.toast-err{background:var(--red);color:#fff;}
.toast-info{background:var(--blue);color:#fff;}
@keyframes slideIn{from{transform:translateX(100px);opacity:0;}to{transform:translateX(0);opacity:1;}}
.empty{text-align:center;padding:50px 20px;color:var(--t2);}
.empty-icon{font-size:42px;margin-bottom:12px;}
.empty-text{font-size:17px;}
.tab-bar{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid var(--border);}
.tab-btn{padding:12px 24px;cursor:pointer;font-size:15px;font-weight:600;color:var(--t2);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;user-select:none;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--pri);border-bottom-color:var(--pri);}
.fin-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);}
.fin-row:last-child{border-bottom:none;}
.progress-bar{height:8px;background:var(--s2);border-radius:4px;overflow:hidden;margin-top:6px;}
.progress-fill{height:100%;border-radius:4px;transition:width .3s;}
::-webkit-scrollbar{width:7px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
@media print{body{background:#fff;}.sidebar,.header,.notif-bar{display:none!important;}.main{width:100%;}.content{padding:0;}}
/* UPDATE BANNER */
.update-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:3000;justify-content:center;align-items:center;}
.update-overlay.show{display:flex;}
.update-box{background:var(--surface);border:2px solid var(--green);border-radius:20px;padding:40px;max-width:520px;width:90%;text-align:center;animation:popIn .4s ease;}
@keyframes popIn{from{transform:scale(.8);opacity:0;}to{transform:scale(1);opacity:1;}}
.update-box h2{font-size:26px;color:var(--green);margin-bottom:8px;}
.update-box .ver-compare{display:flex;justify-content:center;align-items:center;gap:16px;margin:20px 0;font-size:20px;font-weight:700;}
.update-box .ver-old{color:var(--t2);text-decoration:line-through;}
.update-box .ver-arrow{color:var(--green);font-size:28px;}
.update-box .ver-new{color:var(--green);font-size:28px;}
.update-box .update-timer{margin-top:16px;font-size:13px;color:var(--t2);}
.header-update{display:none;padding:6px 14px;border-radius:20px;background:rgba(34,197,94,.15);color:var(--green);font-size:13px;font-weight:600;cursor:pointer;animation:pulse 2s infinite;border:1px solid rgba(34,197,94,.3);}
.header-update.show{display:flex;align-items:center;gap:6px;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}
@keyframes loading{0%{width:20%;}50%{width:80%;}100%{width:20%;}}
</style>
</head>

function ensureFields(){
    if(!DB.inventario)DB.inventario=[];
    if(!DB.nextInv)DB.nextInv=1;
    if(!DB.invCategorias)DB.invCategorias=['Carnes','Pollo','Mariscos','Vegetales','Frutas','Lacteos','Granos','Bebidas','Licores','Condimentos','Pan/Harina','Limpieza','Desechables','Otros'];

    if(!DB.audit)DB.audit=[];
    if(!DB.backupConfig)DB.backupConfig={enabled:false,frequency:'daily',lastBackup:null};
    if(!DB.nextPedido)DB.nextPedido=DB.pedidos.length>0?Math.max.apply(null,DB.pedidos.map(function(p){return p.id;}))+1:1;
    if(!DB.nextMenu)DB.nextMenu=DB.menu.length>0?Math.max.apply(null,DB.menu.map(function(m){return m.id;}))+1:1;

}

// =========================================================
function getAlerts(){
    var alerts=[];
    var today=new Date();
    // Low stock
    DB.inventario.forEach(function(p){
        if(p.qty<=p.minStock&&p.minStock>0){
            alerts.push({type:'danger',text:p.name+': STOCK BAJO ('+p.qty+' '+p.unit+' - minimo: '+p.minStock+')',section:'inventario'});
        }
    });
    // Expiring soon (7 days)
    DB.inventario.forEach(function(p){
        if(p.expDate){
            var exp=new Date(p.expDate);
            var diff=Math.ceil((exp-today)/(1000*60*60*24));
            if(diff<0)alerts.push({type:'danger',text:p.name+': EXPIRADO hace '+Math.abs(diff)+' dias!',section:'inventario'});
            else if(diff<=7)alerts.push({type:'warn',text:p.name+': Expira en '+diff+' dias ('+p.expDate+')',section:'inventario'});
        }
    });
    return alerts;
}

function checkNotifs(){
    var alerts=getAlerts();
    var area=document.getElementById('notif-area');
    if(!area)return;
    if(alerts.length===0){area.innerHTML='';area.style.padding='0';return;}
    area.style.padding='10px 24px';
    area.innerHTML=alerts.map(function(a){
        return '<div class="notif-pill '+a.type+'" onclick="go(\''+a.section+'\')">&#9888; '+a.text+'</div>';
    }).join('');
}

// =========================================================
//  AUTO BACKUP
// =========================================================
function checkAutoBackup(){
    if(!DB.backupConfig.enabled)return;
    var now=Date.now();
    var last=DB.backupConfig.lastBackup?new Date(DB.backupConfig.lastBackup).getTime():0;
    var freq=DB.backupConfig.frequency;
    var interval={'daily':86400000,'weekly':604800000,'monthly':2592000000,'yearly':31536000000};
    var ms=interval[freq]||86400000;
    if(now-last>=ms){
        cppMsg({action:'backup',label:'auto_'+freq,data:DB});
        DB.backupConfig.lastBackup=new Date().toISOString();
        auditLog('backup_auto','Backup automatico '+freq);
        saveDB();
    }
}
setInterval(checkAutoBackup,60000);

function isThisWeek(d){if(!d)return false;var n=new Date(),s=new Date(d);var day=n.getDay()||7;var mon=new Date(n);mon.setDate(n.getDate()-(day-1));mon.setHours(0,0,0,0);return s>=mon;}
function isThisMonth(d){if(!d)return false;var n=new Date(),s=new Date(d);return s.getMonth()===n.getMonth()&&s.getFullYear()===n.getFullYear();}
function isThisYear(d){if(!d)return false;return new Date(d).getFullYear()===new Date().getFullYear();}
function timeAgo(d){var m=Math.floor((Date.now()-new Date(d).getTime())/60000);return m<1?'Ahora':m<60?m+' min':''+Math.floor(m/60)+'h '+m%60+'m';}

function newPedido(mesaId){
    var items=[],selCat='Todos';
    function r(){
        var ma=DB.menu.filter(function(m){return m.active!==false;});
        var fi=selCat==='Todos'?ma:ma.filter(function(m){return m.cat===selCat;});
        var tot=items.reduce(function(s,i){return s+i.price*i.qty;},0);
        openModal('<h2>NUEVO PEDIDO - Mesa '+mesaId+'</h2>'+
            '<div class="cat-tabs"><div class="cat-tab'+(selCat==='Todos'?' active':'')+'" onclick="window._sc(\'Todos\')">Todos</div>'+
            DB.categorias.map(function(c){var n=ma.filter(function(m){return m.cat===c;}).length;return n>0?'<div class="cat-tab'+(selCat===c?' active':'')+'" onclick="window._sc(\''+c+'\')">'+c+'</div>':'';}).join('')+'</div>'+
            '<div class="menu-grid">'+fi.map(function(m){var ic=items.find(function(i){return i.menuId===m.id;});
                return '<div class="menu-item" onclick="window._ai('+m.id+')" style="'+(ic?'border-color:var(--green);background:rgba(34,197,94,.08);':'')+'"><div class="menu-item-name">'+m.name+'</div><div class="menu-item-cat">'+m.cat+'</div><div class="menu-item-price">'+fmt(m.price)+'</div>'+(ic?'<div style="color:var(--green);font-weight:700;margin-top:3px;">x'+ic.qty+'</div>':'')+'</div>';
            }).join('')+'</div>'+
            (items.length>0?'<div style="margin-top:20px;padding-top:16px;border-top:2px solid var(--border);"><h3 style="margin-bottom:12px;">PEDIDO ('+items.reduce(function(s,i){return s+i.qty;},0)+' items)</h3>'+
                items.map(function(it,i){return '<div class="ped-item"><span class="ped-name">'+it.name+'</span><div class="ped-actions"><button class="qty-btn" onclick="window._cq('+i+',-1)">-</button><span class="ped-qty">'+it.qty+'</span><button class="qty-btn" onclick="window._cq('+i+',1)">+</button><span class="ped-price">'+fmt(it.price*it.qty)+'</span></div></div>';}).join('')+
                '<div style="text-align:right;font-size:26px;font-weight:800;color:var(--pri);margin-top:14px;">TOTAL: '+fmt(tot)+'</div></div>':'')+
            '<div class="modal-foot"><button class="btn btn-sec btn-lg" onclick="closeModal()">CANCELAR</button>'+(items.length>0?'<button class="btn btn-green btn-lg" onclick="window._confirm()">ENVIAR A COCINA</button>':'')+'</div>');
    }
    window._sc=function(c){selCat=c;r();};
    window._ai=function(mid){var mi=DB.menu.find(function(m){return m.id===mid;});var ex=items.find(function(i){return i.menuId===mid;});if(ex)ex.qty++;else items.push({menuId:mid,name:mi.name,price:mi.price,qty:1});r();};
    window._cq=function(i,d){items[i].qty+=d;if(items[i].qty<=0)items.splice(i,1);r();};
    window._confirm=function(){
        var tot=items.reduce(function(s,i){return s+i.price*i.qty;},0);
        var ped={id:DB.nextPedido++,mesa:mesaId,items:items.slice(),total:tot,status:'cocina',createdAt:new Date().toISOString(),closedAt:null};
        DB.pedidos.push(ped);var mesa=DB.mesas.find(function(m){return m.id===mesaId;});mesa.status='ocupada';mesa.pedido=ped.id;
        auditLog('pedido_creado','Mesa '+mesaId+' Pedido #'+ped.id+' '+fmt(tot));saveDB();closeModal();render();toast('Pedido #'+ped.id+' enviado a cocina');
    };r();
}

function editPedido(mesaId){
    var mesa=DB.mesas.find(function(m){return m.id===mesaId;});
    var ped=DB.pedidos.find(function(p){return p.id===mesa.pedido;});if(!ped)return;
    var selCat='Todos';
    function r(){
        var ma=DB.menu.filter(function(m){return m.active!==false;});
        var fi=selCat==='Todos'?ma:ma.filter(function(m){return m.cat===selCat;});
        openModal('<h2>MESA '+mesaId+' - Pedido #'+ped.id+'</h2>'+
            '<h3 style="margin-bottom:12px;">Items del Pedido</h3>'+
            ped.items.map(function(it,i){return '<div class="ped-item"><span class="ped-name">'+it.name+'</span><div class="ped-actions"><button class="qty-btn" onclick="window._eq('+i+',-1)">-</button><span class="ped-qty">'+it.qty+'</span><button class="qty-btn" onclick="window._eq('+i+',1)">+</button><span class="ped-price">'+fmt(it.price*it.qty)+'</span></div></div>';}).join('')+
            '<div style="text-align:right;font-size:26px;font-weight:800;color:var(--pri);margin-top:14px;">TOTAL: '+fmt(ped.total)+'</div>'+
            '<h3 style="margin:20px 0 12px;">AGREGAR MAS</h3>'+
            '<div class="cat-tabs"><div class="cat-tab'+(selCat==='Todos'?' active':'')+'" onclick="window._sc2(\'Todos\')">Todos</div>'+
            DB.categorias.map(function(c){var n=ma.filter(function(m){return m.cat===c;}).length;return n>0?'<div class="cat-tab'+(selCat===c?' active':'')+'" onclick="window._sc2(\''+c+'\')">'+c+'</div>':'';}).join('')+'</div>'+
            '<div class="menu-grid">'+fi.map(function(m){return '<div class="menu-item" onclick="window._ae('+m.id+')"><div class="menu-item-name">'+m.name+'</div><div class="menu-item-price">'+fmt(m.price)+'</div></div>';}).join('')+'</div>'+
            '<div class="modal-foot"><button class="btn btn-red btn-lg" onclick="window._cancelPed()">CANCELAR PEDIDO</button><button class="btn btn-sec btn-lg" onclick="closeModal();render();">CERRAR</button><button class="btn btn-pri btn-lg" onclick="window._pedirCuenta()">PEDIR CUENTA</button></div>');
    }
    window._sc2=function(c){selCat=c;r();};
    window._eq=function(i,d){ped.items[i].qty+=d;if(ped.items[i].qty<=0)ped.items.splice(i,1);ped.total=pedTotal(ped);if(ped.items.length===0){window._cancelPed();return;}saveDB();r();};
    window._ae=function(mid){var mi=DB.menu.find(function(m){return m.id===mid;});var ex=ped.items.find(function(i){return i.menuId===mid;});if(ex)ex.qty++;else ped.items.push({menuId:mid,name:mi.name,price:mi.price,qty:1});ped.total=pedTotal(ped);auditLog('pedido_mod','Mesa '+mesaId+' +'+mi.name);saveDB();r();};
    window._cancelPed=function(){ped.status='cancelado';mesa.status='libre';mesa.pedido=null;auditLog('pedido_cancelado','Mesa '+mesaId+' #'+ped.id);saveDB();closeModal();render();toast('Pedido cancelado','err');};
    window._pedirCuenta=function(){mesa.status='cuenta';saveDB();closeModal();render();toast('Mesa '+mesaId+' pidio la cuenta');};
    r();
}

function cobrarMesa(mesaId){
    var mesa=DB.mesas.find(function(m){return m.id===mesaId;});
    var ped=DB.pedidos.find(function(p){return p.id===mesa.pedido;});if(!ped)return;
    var r=DB.restaurant;
    openModal(
        '<div class="receipt" id="print-receipt"><div class="receipt-head"><h3>'+r.name+'</h3><p>'+r.address+'</p><p>Tel: '+r.phone+'</p><p style="margin-top:8px;font-weight:bold;">Mesa: '+mesaId+' | Pedido: #'+ped.id+'</p><p>'+new Date().toLocaleString('es')+'</p></div>'+
        '<div class="receipt-line" style="font-weight:bold;border-bottom:1px dashed #000;padding-bottom:4px;margin-bottom:4px;"><span>ITEM</span><span>TOTAL</span></div>'+
        ped.items.map(function(i){return '<div class="receipt-line"><span>'+i.qty+'x '+i.name+'</span><span>'+fmt(i.price*i.qty)+'</span></div>';}).join('')+
        '<div class="receipt-line receipt-total"><span>TOTAL A PAGAR</span><span>'+fmt(ped.total)+'</span></div>'+
        '<div class="receipt-foot">Gracias por su visita!<br>Vuelva pronto</div></div>'+
        '<div class="modal-foot"><button class="btn btn-sec btn-lg" onclick="closeModal();render();">VOLVER</button><button class="btn btn-pri btn-lg" onclick="nativePrint()">IMPRIMIR</button><button class="btn btn-green btn-lg" onclick="window._cobrar()">COBRADO</button></div>');
    window._cobrar=function(){
        ped.status='pagado';ped.closedAt=new Date().toISOString();mesa.status='libre';mesa.pedido=null;
        auditLog('pago','Mesa '+mesaId+' #'+ped.id+' '+fmt(ped.total));saveDB();closeModal();render();toast('Mesa '+mesaId+' cobrada: '+fmt(ped.total));
    };
}

function fmenu(c,el){document.querySelectorAll('#mcats .cat-tab').forEach(function(t){t.classList.remove('active');});el.classList.add('active');document.querySelectorAll('#mtb tr').forEach(function(tr){tr.style.display=(c==='Todos'||tr.dataset.cat===c)?'':'none';});}
function addPlato(){openModal('<h2>AGREGAR PLATO</h2><div class="fg"><label>Nombre</label><input id="pn" placeholder="Ej: Pollo a la Plancha"></div><div class="form-row"><div class="fg"><label>Categoria</label><select id="pc">'+DB.categorias.map(function(c){return '<option>'+c+'</option>';}).join('')+'</select></div><div class="fg"><label>Precio</label><input id="pp" type="number" step="0.01" placeholder="0.00"></div></div><div class="modal-foot"><button class="btn btn-sec btn-lg" onclick="closeModal()">CANCELAR</button><button class="btn btn-green btn-lg" onclick="savePlato()">GUARDAR</button></div>');setTimeout(function(){$('pn').focus();},100);}
function savePlato(){var n=$('pn').value.trim(),c=$('pc').value,p=parseFloat($('pp').value)||0;if(!n){toast('Escribe un nombre','err');return;}if(p<=0){toast('Precio invalido','err');return;}DB.menu.push({id:DB.nextMenu++,name:n,cat:c,price:p,active:true});auditLog('menu_add',n+' '+fmt(p));saveDB();closeModal();render();toast(n+' agregado');}
function editPlato(id){var m=DB.menu.find(function(x){return x.id===id;});openModal('<h2>EDITAR PLATO</h2><div class="fg"><label>Nombre</label><input id="pn" value="'+m.name+'"></div><div class="form-row"><div class="fg"><label>Categoria</label><select id="pc">'+DB.categorias.map(function(c){return '<option'+(c===m.cat?' selected':'')+'>'+c+'</option>';}).join('')+'</select></div><div class="fg"><label>Precio</label><input id="pp" type="number" step="0.01" value="'+m.price+'"></div></div><div class="modal-foot"><button class="btn btn-red btn-lg" onclick="delPlato('+id+')">ELIMINAR</button><button class="btn btn-sec btn-lg" onclick="closeModal()">CANCELAR</button><button class="btn btn-green btn-lg" onclick="updPlato('+id+')">GUARDAR</button></div>');}
function updPlato(id){var m=DB.menu.find(function(x){return x.id===id;});m.name=$('pn').value.trim();m.cat=$('pc').value;m.price=parseFloat($('pp').value)||0;auditLog('menu_edit',m.name);saveDB();closeModal();render();toast('Actualizado');}
function delPlato(id){var m=DB.menu.find(function(x){return x.id===id;});DB.menu=DB.menu.filter(function(x){return x.id!==id;});auditLog('menu_del',m.name);saveDB();closeModal();render();toast('Eliminado','err');}
function togglePlato(id){var m=DB.menu.find(function(x){return x.id===id;});m.active=!m.active;saveDB();render();}
function addCat(){openModal('<h2>NUEVA CATEGORIA</h2><div class="fg"><label>Nombre</label><input id="cn" placeholder="Ej: Sopas Especiales"></div><div class="modal-foot"><button class="btn btn-sec btn-lg" onclick="closeModal()">CANCELAR</button><button class="btn btn-green btn-lg" onclick="saveCat()">GUARDAR</button></div>');setTimeout(function(){$('cn').focus();},100);}
function saveCat(){var n=$('cn').value.trim();if(!n){toast('Escribe nombre','err');return;}if(DB.categorias.indexOf(n)!==-1){toast('Ya existe','err');return;}DB.categorias.push(n);saveDB();closeModal();render();toast('Categoria creada');}

function vInventario(){
    var low=DB.inventario.filter(function(p){return p.qty<=p.minStock&&p.minStock>0;});
    var expiring=DB.inventario.filter(function(p){if(!p.expDate)return false;var d=Math.ceil((new Date(p.expDate)-new Date())/(86400000));return d<=7;});
    var totalValue=DB.inventario.reduce(function(s,p){return s+p.qty*p.cost;},0);

    return '<div class="stats-grid">'+
        '<div class="card stat-card"><div class="label">Total Productos</div><div class="value">'+DB.inventario.length+'</div></div>'+
        '<div class="card stat-card"><div class="label">Valor del Inventario</div><div class="value" style="color:var(--pri)">'+fmt(totalValue)+'</div></div>'+
        '<div class="card stat-card"><div class="label">Stock Bajo</div><div class="value" style="color:'+(low.length>0?'var(--red)':'var(--green)')+'">'+low.length+'</div></div>'+
        '<div class="card stat-card"><div class="label">Por Expirar</div><div class="value" style="color:'+(expiring.length>0?'var(--yellow)':'var(--green)')+'">'+expiring.length+'</div></div>'+
    '</div>'+
    '<div style="display:flex;gap:12px;margin-bottom:16px;"><button class="btn btn-pri btn-lg" onclick="addInvItem()">+ AGREGAR PRODUCTO</button><button class="btn btn-sec btn-lg" onclick="addInvCat()">+ CATEGORIA</button></div>'+
    (low.length>0?'<div class="card" style="margin-bottom:14px;border-color:var(--red);"><h3 style="color:var(--red);margin-bottom:10px;">&#9888; STOCK BAJO - Necesita pedido</h3>'+
        low.map(function(p){return '<div class="fin-row"><span style="font-weight:600;color:var(--red);">'+p.name+'</span><span>'+p.qty+' '+p.unit+' (min: '+p.minStock+')</span><button class="btn btn-pri btn-sm" onclick="restockItem('+p.id+')">REABASTECER</button></div>';}).join('')+'</div>':'')+
    (expiring.length>0?'<div class="card" style="margin-bottom:14px;border-color:var(--yellow);"><h3 style="color:var(--yellow);margin-bottom:10px;">&#9888; PROXIMO A EXPIRAR</h3>'+
        expiring.map(function(p){var d=Math.ceil((new Date(p.expDate)-new Date())/86400000);return '<div class="fin-row"><span style="font-weight:600;color:'+(d<0?'var(--red)':'var(--yellow)')+';">'+p.name+'</span><span>'+(d<0?'EXPIRADO hace '+Math.abs(d)+' dias':'Expira en '+d+' dias')+'</span></div>';}).join('')+'</div>':'')+
    '<div class="table-wrap"><table><thead><tr><th>Producto</th><th>Categoria</th><th>Cantidad</th><th>Costo Unit.</th><th>Min. Stock</th><th>Expiracion</th><th>Acciones</th></tr></thead><tbody>'+
        (DB.inventario.length>0?DB.inventario.map(function(p){
            var isLow=p.qty<=p.minStock&&p.minStock>0;
            var isExp=p.expDate&&Math.ceil((new Date(p.expDate)-new Date())/86400000)<=7;
            return '<tr><td style="font-weight:600;">'+p.name+(isLow?' <span style="color:var(--red);">&#9888;</span>':'')+'</td><td><span class="badge b-purple">'+p.category+'</span></td><td style="color:'+(isLow?'var(--red)':'var(--text)')+';font-weight:700;">'+p.qty+' '+p.unit+'</td><td>'+fmt(p.cost)+'</td><td>'+p.minStock+'</td><td style="color:'+(isExp?'var(--red)':'var(--t2)')+';">'+(p.expDate||'N/A')+'</td><td><button class="btn btn-sec btn-sm" onclick="editInvItem('+p.id+')">EDITAR</button> <button class="btn btn-pri btn-sm" onclick="restockItem('+p.id+')">+STOCK</button></td></tr>';
        }).join(''):'<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--t2);">No hay productos en inventario. Agrega uno.</td></tr>')+
    '</tbody></table></div>';
}

function saveInvItem(){

    DB.inventario.push({id:DB.nextInv++,name:n,category:$('ic').value,unit:$('iu').value,qty:parseFloat($('iq').value)||0,cost:parseFloat($('ip').value)||0,minStock:parseInt($('im').value)||0,expDate:$('ie').value||null});
    auditLog('inv_add',n);saveDB();closeModal();render();toast(n+' agregado al inventario');

}

function updInvItem(id){var p=DB.inventario.find(function(x){return x.id===id;});p.name=$('in').value.trim();p.category=$('ic').value;p.unit=$('iu').value;p.qty=parseFloat($('iq').value)||0;p.cost=parseFloat($('ip').value)||0;p.minStock=parseInt($('im').value)||0;p.expDate=$('ie').value||null;auditLog('inv_edit',p.name);saveDB();closeModal();render();toast('Actualizado');}
function delInvItem(id){var p=DB.inventario.find(function(x){return x.id===id;});DB.inventario=DB.inventario.filter(function(x){return x.id!==id;});auditLog('inv_del',p.name);saveDB();closeModal();render();toast('Eliminado','err');}

function restockItem(id){
    var p=DB.inventario.find(function(x){return x.id===id;});
    openModal('<h2>REABASTECER: '+p.name+'</h2><p style="color:var(--t2);margin-bottom:14px;">Actual: <strong style="color:var(--text);">'+p.qty+' '+p.unit+'</strong> | Minimo: '+p.minStock+'</p>'+
        '<div class="fg"><label>Cantidad a Agregar</label><input id="rq" type="number" step="0.1" placeholder="Ej: 20"></div>'+
        '<div class="fg"><label>Costo total de la compra (opcional)</label><input id="rc" type="number" step="0.01" placeholder="0.00"></div>'+
        '<div class="modal-foot"><button class="btn btn-sec btn-lg" onclick="closeModal()">CANCELAR</button><button class="btn btn-green btn-lg" onclick="doRestock('+id+')">CONFIRMAR</button></div>');
}
function doRestock(id){
    var p=DB.inventario.find(function(x){return x.id===id;});
    var qty=parseFloat($('rq').value)||0;var cost=parseFloat($('rc').value)||0;
    if(qty<=0){toast('Cantidad invalida','err');return;}
    p.qty+=qty;
    if(cost>0){DB.gastos.push({id:DB.nextGasto++,date:new Date().toISOString(),category:'Ingredientes',description:'Restock: '+p.name+' (+'+qty+' '+p.unit+')',amount:cost});auditLog('gasto','Restock '+p.name+' '+fmt(cost));}
    auditLog('inv_restock',p.name+' +'+qty+' '+p.unit);saveDB();closeModal();render();toast(p.name+' reabastecido: +'+qty+' '+p.unit);
}

var finTab='resumen';
function vFinanzas(){

function getVentas(filter){return DB.pedidos.filter(function(p){return p.status==='pagado'&&filter(p.closedAt);});}
function getGastos(filter){return DB.gastos.filter(function(g){return filter(g.date);});}

function vFinResumen(){
    var pagados=DB.pedidos.filter(function(p){return p.status==='pagado';});
    var totalVentas=pagados.reduce(function(s,p){return s+p.total;},0);
    var totalGastos=DB.gastos.reduce(function(s,g){return s+g.amount;},0);
    var ganancia=totalVentas-totalGastos;
    var vHoy=getVentas(isToday).reduce(function(s,p){return s+p.total;},0);
    var gHoy=getGastos(isToday).reduce(function(s,g){return s+g.amount;},0);
    var vMes=getVentas(isThisMonth).reduce(function(s,p){return s+p.total;},0);
    var gMes=getGastos(isThisMonth).reduce(function(s,g){return s+g.amount;},0);

    return '<div class="stats-grid">'+
        '<div class="card stat-card"><div class="label">Ventas Totales</div><div class="value" style="color:var(--green)">'+fmt(totalVentas)+'</div><div class="sub">'+pagados.length+' pedidos</div></div>'+
        '<div class="card stat-card"><div class="label">Gastos Totales</div><div class="value" style="color:var(--red)">'+fmt(totalGastos)+'</div><div class="sub">'+DB.gastos.length+' gastos</div></div>'+
        '<div class="card stat-card"><div class="label">Ganancia Neta</div><div class="value" style="color:'+(ganancia>=0?'var(--green)':'var(--red)')+'">'+fmt(ganancia)+'</div><div class="sub">'+(ganancia>=0?'Positiva':'Perdida')+'</div></div>'+
        '<div class="card stat-card"><div class="label">Margen</div><div class="value" style="color:var(--pri)">'+(totalVentas>0?(ganancia/totalVentas*100).toFixed(1):'0')+'%</div></div>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">'+
        '<div class="card"><h3 style="margin-bottom:14px;">Hoy</h3>'+
            '<div class="fin-row"><span>Ventas</span><span style="color:var(--green);font-weight:700;">'+fmt(vHoy)+'</span></div>'+
            '<div class="fin-row"><span>Gastos</span><span style="color:var(--red);font-weight:700;">'+fmt(gHoy)+'</span></div>'+
            '<div class="fin-row"><span style="font-weight:700;">Ganancia</span><span style="color:'+(vHoy-gHoy>=0?'var(--green)':'var(--red)')+';font-weight:700;font-size:18px;">'+fmt(vHoy-gHoy)+'</span></div>'+
        '</div>'+
        '<div class="card"><h3 style="margin-bottom:14px;">Este Mes</h3>'+
            '<div class="fin-row"><span>Ventas</span><span style="color:var(--green);font-weight:700;">'+fmt(vMes)+'</span></div>'+
            '<div class="fin-row"><span>Gastos</span><span style="color:var(--red);font-weight:700;">'+fmt(gMes)+'</span></div>'+
            '<div class="fin-row"><span style="font-weight:700;">Ganancia</span><span style="color:'+(vMes-gMes>=0?'var(--green)':'var(--red)')+';font-weight:700;font-size:18px;">'+fmt(vMes-gMes)+'</span></div>'+
        '</div>'+
    '</div>'+
    '<div class="card" style="margin-top:14px;"><h3 style="margin-bottom:14px;">Gastos por Categoria</h3>'+
        (function(){
            var cats={};DB.gastos.forEach(function(g){cats[g.category]=(cats[g.category]||0)+g.amount;});
            var sorted=Object.entries(cats).sort(function(a,b){return b[1]-a[1];});
            var max=sorted.length>0?sorted[0][1]:1;
            return sorted.length>0?sorted.map(function(c){
                return '<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;"><span>'+c[0]+'</span><span style="font-weight:700;color:var(--red);">'+fmt(c[1])+'</span></div><div class="progress-bar"><div class="progress-fill" style="width:'+((c[1]/max)*100)+'%;background:var(--red);"></div></div></div>';
            }).join(''):'<div style="color:var(--t2);">No hay gastos registrados</div>';
        })()+
    '</div>';
}

function vFinPeriodo(periodo){
    var filter,label;
    switch(periodo){
        case 'hoy':filter=isToday;label='Hoy';break;
        case 'semana':filter=isThisWeek;label='Esta Semana';break;
        case 'mes':filter=isThisMonth;label='Este Mes';break;
        case 'anual':filter=isThisYear;label='Este Año';break;
    }
    var ventas=getVentas(filter);var gastos=getGastos(filter);
    var totalV=ventas.reduce(function(s,p){return s+p.total;},0);
    var totalG=gastos.reduce(function(s,g){return s+g.amount;},0);
    var ganancia=totalV-totalG;
    var avg=ventas.length>0?totalV/ventas.length:0;

    // Top platos
    var platoCnt={};ventas.forEach(function(p){p.items.forEach(function(i){platoCnt[i.name]=(platoCnt[i.name]||0)+i.qty;});});
    var topPlatos=Object.entries(platoCnt).sort(function(a,b){return b[1]-a[1];}).slice(0,10);

    return '<div class="stats-grid">'+
        '<div class="card stat-card"><div class="label">Ventas '+label+'</div><div class="value" style="color:var(--green)">'+fmt(totalV)+'</div><div class="sub">'+ventas.length+' pedidos</div></div>'+
        '<div class="card stat-card"><div class="label">Gastos '+label+'</div><div class="value" style="color:var(--red)">'+fmt(totalG)+'</div><div class="sub">'+gastos.length+' gastos</div></div>'+
        '<div class="card stat-card"><div class="label">Ganancia '+label+'</div><div class="value" style="color:'+(ganancia>=0?'var(--green)':'var(--red)')+'">'+fmt(ganancia)+'</div></div>'+
        '<div class="card stat-card"><div class="label">Ticket Promedio</div><div class="value" style="color:var(--pri)">'+fmt(avg)+'</div></div>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">'+
        '<div class="card"><h3 style="margin-bottom:14px;">Top Platos - '+label+'</h3>'+
            (topPlatos.length>0?topPlatos.map(function(p,i){return '<div class="fin-row"><span><span style="color:var(--pri);font-weight:700;margin-right:6px;">#'+(i+1)+'</span>'+p[0]+'</span><span style="color:var(--green);font-weight:700;">'+p[1]+' vendidos</span></div>';}).join(''):'<div style="color:var(--t2);">Sin datos</div>')+
        '</div>'+
        '<div class="card"><h3 style="margin-bottom:14px;">Detalle de Ventas</h3>'+
            (ventas.length>0?ventas.slice(-10).reverse().map(function(p){return '<div class="fin-row"><span>Mesa '+p.mesa+' #'+p.id+'</span><span style="color:var(--t2);font-size:12px;">'+new Date(p.closedAt).toLocaleString('es')+'</span><span style="color:var(--green);font-weight:700;">'+fmt(p.total)+'</span></div>';}).join(''):'<div style="color:var(--t2);">Sin ventas</div>')+
        '</div>'+
    '</div>';
}

function vFinGastos(){
    return '<div class="table-wrap"><table><thead><tr><th>Fecha</th><th>Categoria</th><th>Descripcion</th><th>Monto</th><th>Accion</th></tr></thead><tbody>'+
        (DB.gastos.length>0?DB.gastos.slice().reverse().map(function(g){
            return '<tr><td style="color:var(--t2);">'+new Date(g.date).toLocaleDateString('es')+'</td><td><span class="badge b-red">'+g.category+'</span></td><td>'+g.description+'</td><td style="color:var(--red);font-weight:700;">'+fmt(g.amount)+'</td><td><button class="btn btn-red btn-sm" onclick="delGasto('+g.id+')">X</button></td></tr>';
        }).join(''):'<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--t2);">No hay gastos registrados</td></tr>')+
    '</tbody></table></div>';
}

function addGasto(){
    openModal('<h2>REGISTRAR GASTO</h2>'+
        '<div class="fg"><label>Descripcion</label><input id="gd" placeholder="Ej: Compra de carnes para la semana"></div>'+
        '<div class="form-row"><div class="fg"><label>Categoria</label><select id="gc">'+DB.gastoCategorias.map(function(c){return '<option>'+c+'</option>';}).join('')+'</select></div><div class="fg"><label>Monto</label><input id="gm" type="number" step="0.01" placeholder="0.00"></div></div>'+
        '<div class="fg"><label>Fecha</label><input id="gf" type="date" value="'+new Date().toISOString().split('T')[0]+'"></div>'+
        '<div class="modal-foot"><button class="btn btn-sec btn-lg" onclick="closeModal()">CANCELAR</button><button class="btn btn-green btn-lg" onclick="saveGasto()">GUARDAR</button></div>');
}
function saveGasto(){
    var d=$('gd').value.trim(),m=parseFloat($('gm').value)||0;
    if(!d){toast('Escribe descripcion','err');return;}if(m<=0){toast('Monto invalido','err');return;}
    DB.gastos.push({id:DB.nextGasto++,date:$('gf').value||new Date().toISOString(),category:$('gc').value,description:d,amount:m});
    auditLog('gasto_add',d+' '+fmt(m));saveDB();closeModal();render();toast('Gasto registrado: '+fmt(m));
}
function delGasto(id){DB.gastos=DB.gastos.filter(function(g){return g.id!==id;});auditLog('gasto_del','Gasto #'+id);saveDB();render();toast('Gasto eliminado','err');}

// EXPORT CSV
function exportFinCSV(){
    var lines=['Tipo,Fecha,Descripcion,Categoria,Monto'];
    DB.pedidos.filter(function(p){return p.status==='pagado';}).forEach(function(p){
        lines.push('Venta,'+new Date(p.closedAt).toLocaleDateString('es')+',Mesa '+p.mesa+' Pedido #'+p.id+',Ventas,'+p.total.toFixed(2));
    });
    DB.gastos.forEach(function(g){
        lines.push('Gasto,'+new Date(g.date).toLocaleDateString('es')+','+g.description.replace(/,/g,';')+','+g.category+','+g.amount.toFixed(2));
    });
    var csv=lines.join('\n');
    var fname='RestaurantApp_Finanzas_'+new Date().toISOString().split('T')[0]+'.csv';
    cppMsg({action:'exportFile',filename:fname,content:csv});
}

        }).join('')+'</tbody></table></div>';
};

function restoreBackupFile(f){

}
function deleteBackupFile(f){

}

    var logs=DB.audit.slice().reverse().slice(0,200);
    return '<div style="margin-bottom:14px;display:flex;gap:12px;align-items:center;"><span style="color:var(--t2);">'+DB.audit.length+' registros totales (mostrando ultimos 200)</span>'+
        '<button class="btn btn-sec btn-sm" onclick="exportAuditCSV()">EXPORTAR CSV</button><button class="btn btn-sec btn-sm" onclick="printAudit()">IMPRIMIR</button></div>'+
    '<div class="table-wrap"><table><thead><tr><th>Fecha/Hora</th><th>Accion</th><th>Detalle</th></tr></thead><tbody>'+
        (logs.length>0?logs.map(function(l){
            var color='var(--text)';
            if(l.action.indexOf('cancel')!==-1||l.action.indexOf('del')!==-1)color='var(--red)';
            else if(l.action.indexOf('pago')!==-1||l.action.indexOf('cobr')!==-1)color='var(--green)';
            else if(l.action.indexOf('backup')!==-1)color='var(--blue)';
            return '<tr><td style="color:var(--t2);font-size:13px;white-space:nowrap;">'+new Date(l.date).toLocaleString('es')+'</td><td style="color:'+color+';font-weight:600;">'+l.action+'</td><td>'+l.detail+'</td></tr>';
        }).join(''):'<tr><td colspan="3" style="text-align:center;padding:40px;color:var(--t2);">Sin registros</td></tr>')+
    '</tbody></table></div>';
}

function exportAuditCSV(){
    var lines=['Fecha,Accion,Detalle'];
    DB.audit.forEach(function(l){lines.push(new Date(l.date).toLocaleString('es')+','+l.action+','+l.detail.replace(/,/g,';'));});
    cppMsg({action:'exportFile',filename:'RestaurantApp_Auditoria_'+new Date().toISOString().split('T')[0]+'.csv',content:lines.join('\n')});
}

function printAudit(){
    var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:Arial,sans-serif;font-size:11px;margin:20px;}h1{font-size:18px;}table{width:100%;border-collapse:collapse;}th,td{padding:4px 8px;border-bottom:1px solid #ccc;text-align:left;}th{background:#f0f0f0;}</style></head><body><h1>'+DB.restaurant.name+' - Auditoria</h1><p>Fecha: '+new Date().toLocaleString('es')+' | Total registros: '+DB.audit.length+'</p><table><tr><th>Fecha</th><th>Accion</th><th>Detalle</th></tr>'+
        DB.audit.slice(-100).reverse().map(function(l){return '<tr><td>'+new Date(l.date).toLocaleString('es')+'</td><td>'+l.action+'</td><td>'+l.detail+'</td></tr>';}).join('')+'</table></body></html>';
    cppMsg({action:'print',html:html});
}

// =========================================================
//  UPDATES - FULL SYSTEM
// =========================================================
var updateInfo=null;
var updateDismissCount=0; // how many times user said "no"
var autoUpdateTimer=null;
var AUTO_UPDATE_FORCE_DAYS=7; // force after 7 days of ignoring

// Show the big banner overlay
function showUpdateBanner(){
    if(!updateInfo)return;
    var ver=window._appVersion||'2.0';
    var daysSinceFound=0;
    if(DB.updateFirstSeen){
        daysSinceFound=Math.floor((Date.now()-new Date(DB.updateFirstSeen).getTime())/86400000);
    }
    var forceIn=AUTO_UPDATE_FORCE_DAYS-daysSinceFound;

    $('update-box-content').innerHTML=
        '<h2>&#8593; ACTUALIZACION DISPONIBLE</h2>'+
        '<p style="color:var(--t2);font-size:16px;margin-bottom:6px;">Hay una nueva version de RestaurantApp</p>'+
        '<div class="ver-compare">'+
            '<span class="ver-old">v'+ver+'</span>'+
            '<span class="ver-arrow">&#10132;</span>'+
            '<span class="ver-new">v'+updateInfo.latest+'</span>'+
        '</div>'+
        (updateInfo.notes?'<p style="color:var(--t2);font-size:14px;margin-bottom:20px;text-align:left;background:var(--s2);padding:14px;border-radius:10px;">'+updateInfo.notes+'</p>':'')+
        '<div style="display:flex;flex-direction:column;gap:12px;">'+
            '<button class="btn btn-green btn-lg btn-block" style="font-size:18px;padding:18px;" onclick="doUpdateNow()">ACTUALIZAR AHORA</button>'+
            '<button class="btn btn-sec btn-lg btn-block" onclick="dismissUpdate()">MAS TARDE</button>'+
        '</div>'+
        (forceIn>0?'<div class="update-timer">Si no actualizas, el sistema se actualizara automaticamente en '+forceIn+' dia'+(forceIn>1?'s':'')+'</div>':
        '<div class="update-timer" style="color:var(--yellow);">El sistema se actualizara automaticamente hoy</div>');

    $('update-overlay').classList.add('show');
}

function hideUpdateBanner(){
    $('update-overlay').classList.remove('show');
}

function dismissUpdate(){
    hideUpdateBanner();
    updateDismissCount++;
    DB.updateDismissed=new Date().toISOString();
    DB.updateDismissCount=(DB.updateDismissCount||0)+1;
    saveDB();
    toast('Recordatorio: la actualizacion sigue pendiente','info');
}

function doUpdateNow(){
    if(!updateInfo)return;
    if(updateInfo.download){
        cppMsg({action:'downloadUpdate',url:updateInfo.download});
        // Don't hide banner - downloadResult will show progress
    }else{
        openUpdatePage();
        hideUpdateBanner();
    }
}

// Check if we should force update (too many days ignored)
function checkForceUpdate(){
    if(!updateInfo||!DB.updateFirstSeen)return;
    var daysSince=Math.floor((Date.now()-new Date(DB.updateFirstSeen).getTime())/86400000);
    if(daysSince>=AUTO_UPDATE_FORCE_DAYS){
        // Force download
        toast('Actualizacion obligatoria - descargando...','info');
        if(updateInfo.download){
            cppMsg({action:'downloadUpdate',url:updateInfo.download});
        }else{
            showUpdateBanner();
        }
    }
}

// Header indicator
function showHeaderUpdateIndicator(show){
    var el=$('header-upd');
    if(el){
        if(show)el.classList.add('show');
        else el.classList.remove('show');
    }
}

// Called from C++ when update check completes
function updateResult(data){
    updateInfo=null;
    if(data.status==='available'){
        updateInfo=data;
        // Track when we first saw this update
        if(!DB.updateFirstSeen||DB.updateLastVersion!==data.latest){
            DB.updateFirstSeen=new Date().toISOString();
            DB.updateLastVersion=data.latest;
            DB.updateDismissCount=0;
            saveDB();
        }
        // Show header indicator
        showHeaderUpdateIndicator(true);
        // Show the big banner in front
        showUpdateBanner();
    }else if(data.status==='up_to_date'){
        showHeaderUpdateIndicator(false);
        // Clear any pending update info
        DB.updateFirstSeen=null;DB.updateLastVersion=null;DB.updateDismissCount=0;saveDB();
        if(data._manual)toast('Estas al dia! v'+data.current);
    }else if(data.status==='error'){
        if(data._manual)toast(data.msg||'Error buscando actualizaciones','err');
    }else if(data.status==='no_releases'){
        if(data._manual)toast('No hay releases publicados','info');
    }
    // Update config section if visible
    if(curSection==='config'||curSection==='admin')render();
}

function downloadResult(data){
    if(data.status==='downloading'){
        // Show progress overlay
        $('update-box-content').innerHTML=
            '<h2 style="color:var(--yellow);">DESCARGANDO ACTUALIZACION...</h2>'+
            '<div style="margin:30px 0;"><div class="progress-bar" style="height:12px;"><div class="progress-fill" style="width:60%;background:var(--yellow);animation:loading 1.5s infinite;"></div></div></div>'+
            '<p style="color:var(--t2);">No cierres la aplicacion</p>';
        $('update-overlay').classList.add('show');
    }else if(data.status==='installing'){
        $('update-box-content').innerHTML=
            '<h2 style="color:var(--green);">INSTALANDO ACTUALIZACION...</h2>'+
            '<div style="margin:30px 0;font-size:48px;">&#9881;</div>'+
            '<p style="color:var(--t2);font-size:16px;">La aplicacion se reiniciara automaticamente</p>';
        showHeaderUpdateIndicator(false);
        DB.updateFirstSeen=null;DB.updateDismissCount=0;saveDB();
    }else if(data.status==='error'){
        toast(data.msg||'Error descargando','err');
        hideUpdateBanner();
    }
}

function checkForUpdate(){
    cppMsg({action:'checkUpdate'});
}

function openUpdatePage(){
    if(updateInfo&&updateInfo.url)cppMsg({action:'openURL',url:updateInfo.url});
    else cppMsg({action:'openURL',url:'https://github.com/joanrdr/RestaurantApp/releases'});
}

// Admin panel - Updates tab
function vUpdates(){
    var ver=window._appVersion||'2.0';
    var hasUpdate=!!updateInfo;
    return '<div class="stats-grid" style="grid-template-columns:1fr 1fr;">'+
        '<div class="card"><h3 style="margin-bottom:14px;">Version Actual</h3>'+
            '<div style="font-size:48px;font-weight:800;color:var(--pri);margin-bottom:10px;">v'+ver+'</div>'+
            '<p style="color:var(--t2);">RestaurantApp - Sistema de Restaurante</p>'+
            '<p style="color:var(--t2);margin-top:6px;">GitHub: joanrdr/RestaurantApp</p>'+
            (hasUpdate?'<div style="margin-top:14px;padding:12px;background:rgba(34,197,94,.1);border-radius:10px;color:var(--green);font-weight:700;">&#8593; v'+updateInfo.latest+' disponible</div>':
            '<div style="margin-top:14px;padding:12px;background:rgba(34,197,94,.1);border-radius:10px;color:var(--green);">Al dia</div>')+
        '</div>'+
        '<div class="card"><h3 style="margin-bottom:14px;">Buscar Actualizaciones</h3>'+
            '<p style="color:var(--t2);margin-bottom:16px;">Busca automaticamente al abrir la app. Tambien manual:</p>'+
            '<button class="btn btn-pri btn-lg btn-block" onclick="checkForUpdate()">BUSCAR AHORA</button>'+
            (hasUpdate?'<button class="btn btn-green btn-lg btn-block" style="margin-top:10px;" onclick="doUpdateNow()">DESCARGAR v'+updateInfo.latest+'</button>':'')+
            '<div style="margin-top:14px;color:var(--t2);font-size:13px;">'+
                '<p>Actualizacion automatica forzada: '+AUTO_UPDATE_FORCE_DAYS+' dias despues de disponible</p>'+
                (DB.updateDismissCount>0?'<p style="color:var(--yellow);">Veces pospuesta: '+DB.updateDismissCount+'</p>':'')+
            '</div>'+
        '</div>'+
    '</div>';
}

// Config section - add update info
var _origVConfig=vConfig;
vConfig=function(){
    var ver=window._appVersion||'2.0';
    var hasUpdate=!!updateInfo;
    var updateCard='<div class="card" style="margin-bottom:16px;'+(hasUpdate?'border-color:var(--green);':'')+'">' +
        '<h3 style="margin-bottom:14px;">Actualizaciones del Sistema</h3>'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">'+
            '<div><span style="font-size:14px;color:var(--t2);">Version instalada:</span> <span style="font-size:20px;font-weight:800;color:var(--pri);">v'+ver+'</span></div>'+
            (hasUpdate?'<div><span style="font-size:14px;color:var(--t2);">Disponible:</span> <span style="font-size:20px;font-weight:800;color:var(--green);">v'+updateInfo.latest+'</span></div>':
            '<div><span class="badge b-green">AL DIA</span></div>')+
        '</div>'+
        (hasUpdate?'<button class="btn btn-green btn-lg btn-block" onclick="doUpdateNow()">ACTUALIZAR A v'+updateInfo.latest+'</button>':
        '<button class="btn btn-sec btn-lg" onclick="checkForUpdate()">BUSCAR ACTUALIZACION</button>')+
    '</div>';
    return '<div style="max-width:550px;">'+updateCard+_origVConfig().replace('<div style="max-width:550px;">','');
};

// =========================================================
//  INIT
// =========================================================
initDB();
updateClock();
buildNav();
render();
checkAutoBackup();
// Check force update on start if update was pending
setTimeout(function(){
    if(DB.updateFirstSeen&&DB.updateLastVersion){
        checkForceUpdate();
    }
},3000);
</script>
